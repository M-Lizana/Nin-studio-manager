<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIN Studio Manager - Gestor de Carpetas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background-color: #252538;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #89b4fa;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .dropzone {
            border: 3px dashed #89b4fa;
            border-radius: 10px;
            padding: 40px 20px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
            background-color: #1e1e2e;
        }
        .dropzone:hover {
            background-color: rgba(137, 180, 250, 0.05);
            border-color: #b4befe;
        }
        .dropzone-text {
            font-size: 16px;
            color: #a6adc8;
        }
        .dropzone-icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #89b4fa;
        }
        .file-status-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
        }
        .file-badge {
            background-color: #313244;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #45475a;
        }
        .file-badge.loaded {
            background-color: rgba(166, 227, 161, 0.1);
            border-color: #a6e3a1;
            color: #a6e3a1;
        }
        /* Barra de carga */
        .loading-container {
            display: none;
            margin: 20px 0;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #313244;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #a6e3a1;
            transition: width 0.4s ease;
        }
        .loading-text {
            color: #a6e3a1;
            font-size: 14px;
            margin-top: 8px;
        }
        /* Área de Trabajo y Resultados */
        .workspace {
            display: none;
            margin-top: 30px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .results-title {
            color: #f9e2af;
            font-size: 18px;
            margin: 0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-size: 14px;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .btn-ae {
            background-color: #a6e3a1;
            color: #11111b;
        }
        .btn-ae:hover { background-color: #94e2d5; }
        .btn-folder {
            background-color: #89b4fa;
            color: #11111b;
        }
        .btn-folder:hover { background-color: #b4befe; }
        
        /* Layout Dos Columnas */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
        }
        .column-title {
            font-size: 14px;
            color: #bac2de;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        /* Estructura de carpetas visual */
        .folder-tree {
            background-color: #11111b;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            color: #a6e3a1;
            line-height: 1.6;
        }
        .folder-item { margin-left: 15px; color: #f9e2af; }
        .file-item { margin-left: 30px; color: #bac2de; }

        /* Lista de Marcadores */
        .timeline-card {
            background-color: #11111b;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #89b4fa;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .time-badge {
            background-color: #f9e2af;
            color: #11111b;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
        }
        .card-body {
            font-size: 12px;
            color: #bac2de;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NIN Studio Manager</h1>
    
    <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">📁</div>
        <div class="dropzone-text" id="dropzone-instruction">
            <strong>Arrastra JUNTOS el audio (.mp3/.wav) y tus subtítulos (.srt)</strong><br>
            para generar automáticamente la estructura de producción
        </div>
        
        <div class="file-status-container">
            <div class="file-badge" id="badge-audio">❌ Sin Audio</div>
            <div class="file-badge" id="badge-text">❌ Sin Subtítulos (.srt)</div>
        </div>
    </div>

    <div class="loading-container" id="loading-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="loading-text" id="loading-text">Esperando archivos...</div>
    </div>

    <div class="workspace" id="workspace-container">
        <div class="results-header">
            <h2 class="results-title">✨ Proyecto Estructurado con Éxito</h2>
            <div class="btn-group">
                <button class="btn btn-folder" id="download-folders-btn">📂 Descargar Carpetas (.ZIP)</button>
                <button class="btn btn-ae" id="export-ae-btn">📥 Exportar a After Effects</button>
            </div>
        </div>
        
        <div class="grid-layout">
            <div>
                <div class="column-title">📁 Estructura del proyecto</div>
                <div class="folder-tree" id="folder-tree-view">
                    </div>
            </div>
            
            <div>
                <div class="column-title">⏱️ Marcadores del Guion</div>
                <div id="dynamic-cards-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const badgeAudio = document.getElementById('badge-audio');
    const badgeText = document.getElementById('badge-text');
    const loadingContainer = document.getElementById('loading-container');
    const progressFill = document.getElementById('progress-fill');
    const loadingText = document.getElementById('loading-text');
    const workspaceContainer = document.getElementById('workspace-container');
    const dynamicCardsContainer = document.getElementById('dynamic-cards-container');
    const folderTreeView = document.getElementById('folder-tree-view');
    const exportAeBtn = document.getElementById('export-ae-btn');
    const downloadFoldersBtn = document.getElementById('download-folders-btn');

    let audioFile = null;
    let srtFile = null;
    let srtContent = "";
    let marcadoresSincronizados = [];
    let nombreProyectoSanitizado = "Nuevo_Proyecto";

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults (e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => {
            dropzone.style.backgroundColor = 'rgba(137, 180, 250, 0.15)';
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => {
            dropzone.style.backgroundColor = '#1e1e2e';
        }, false);
    });

    dropzone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = Array.from(dt.files);

        files.forEach(file => {
            if (file.name.endsWith('.mp3') || file.name.endsWith('.wav')) {
                audioFile = file;
                badgeAudio.innerText = `🎵 ${file.name}`;
                badgeAudio.classList.add('loaded');
                // Sanitizar el nombre para usarlo como carpeta del proyecto (quitar espacios raros y extensión)
                nombreProyectoSanitizado = file.name.substring(0, file.name.lastIndexOf('.')).replace(/[^a-zA-Z0-9_]/g, "_");
            } else if (file.name.endsWith('.srt')) {
                srtFile = file;
                badgeText.innerText = `📄 ${file.name}`;
                badgeText.classList.add('loaded');
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    srtContent = event.target.result;
                };
                reader.readAsText(file);
            }
        });

        if (audioFile && srtFile) {
            iniciarProcesamientoCompleto();
        } else {
            alert("Arrastra juntos el archivo de Audio y tu archivo .srt");
        }
    }

    function iniciarProcesamientoCompleto() {
        loadingContainer.style.display = 'block';
        workspaceContainer.style.display = 'none';
        
        const etapas = [
            { progreso: 30, texto: "Analizando estructura del guion..." },
            { progreso: 60, texto: "Creando sistema de organización de carpetas..." },
            { progreso: 100, texto: "¡Organización de producción completada!" }
        ];

        let etapaActual = 0;

        const intervalo = setInterval(() => {
            if (etapaActual < etapas.length) {
                progressFill.style.width = etapas[etapaActual].progreso + '%';
                loadingText.innerText = etapas[etapaActual].texto;
                etapaActual++;
            } else {
                clearInterval(intervalo);
                setTimeout(() => {
                    loadingContainer.style.display = 'none';
                    procesarDatos();
                }, 600);
            }
        }, 800);
    }

    function procesarDatos() {
        // 1. Parsear el archivo SRT
        dynamicCardsContainer.innerHTML = "";
        marcadoresSincronizados = [];
        const bloques = srtContent.replace(/\r\n/g, '\n').split('\n\n');

        bloques.forEach((bloque) => {
            const lineas = bloque.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lineas.length >= 3) {
                const tiempoStr = lineas[1];
                const textoSubtitulo = lineas.slice(2).join(' ');
                const partesTiempo = tiempoStr.split('-->');
                if (partesTiempo.length > 0) {
                    const tiempoInicioRaw = partesTiempo[0].trim();
                    marcadoresSincronizados.push({
                        tiempo: srtToSegundos(tiempoInicioRaw),
                        tiempoFormato: tiempoInicioRaw.substring(3, 12),
                        texto: textoSubtitulo
                    });
                }
            }
        });

        // Pintar tarjetas del guion
        marcadoresSincronizados.forEach((marcador, index) => {
            const cardHtml = `
                <div class="timeline-card" style="border-left-color: ${index % 2 === 0 ? '#89b4fa' : '#b4befe'}">
                    <div class="card-header">
                        <span>Frase ${index + 1}</span>
                        <span class="time-badge">${marcador.tiempoFormato}</span>
                    </div>
                    <div class="card-body">"${marcador.texto}"</div>
                </div>
            `;
            dynamicCardsContainer.innerHTML += cardHtml;
        });

        // 2. Dibujar la estructura visual de las carpetas
        folderTreeView.innerHTML = `
            📁 [PROYECTOS_NIN]<br>
            <span class="folder-item">└── 📁 ${nombreProyectoSanitizado}</span><br>
            <span class="file-item">├── 📁 01_Audio</span><br>
            <span class="file-item" style="color: #a6e3a1; font-weight: bold;">│   └── 🎵 ${audioFile.name}</span><br>
            <span class="file-item">├── 📁 02_Materiales</span><br>
            <span class="file-item">│   ├── 📁 Fondos</span><br>
            <span class="file-item">│   └── 📁 Personajes</span><br>
            <span class="file-item">├── 📁 03_After_Effects</span><br>
            <span class="file-item" style="color: #f9e2af;">│   └── ⚙️ importar_marcadores_SRT.jsx</span><br>
            <span class="file-item">└── 📁 04_Renders</span>
        `;

        workspaceContainer.style.display = 'block';
    }

    function srtToSegundos(srtTime) {
        const partes = srtTime.replace(',', '.').split(':');
        const horas = parseFloat(partes[0]) || 0;
        const minutos = parseFloat(partes[1]) || 0;
        const segundos = parseFloat(partes[2]) || 0;
        return (horas * 3600) + (minutos * 60) + segundos;
    }

    // EVENTO DEL BOTÓN DE CARPETAS: Generar el ZIP real estructurado
    downloadFoldersBtn.addEventListener('click', () => {
        const zip = new JSZip();
        
        // Creamos el árbol real de carpetas en el ZIP
        const folderPrincipal = zip.folder(nombreProyectoSanitizado);
        const fAudio = folderPrincipal.folder("01_Audio");
        const fMateriales = folderPrincipal.folder("02_Materiales");
        fMateriales.folder("Fondos");
        fMateriales.folder("Personajes");
        const fAE = folderPrincipal.folder("03_After_Effects");
        folderPrincipal.folder("04_Renders");

        // Metemos el audio que arrastró el usuario dentro de su carpeta
        fAudio.file(audioFile.name, audioFile);

        // Generamos el script de After Effects y lo metemos en su carpeta
        let jsxCode = `// Script generado por NIN Studio Manager\n`;
        jsxCode += `app.beginUndoGroup("Crear Marcadores NIN");\n`;
        jsxCode += `var comp = app.project.activeItem || app.project.items.addComp("NIN_Comp", 1920, 1080, 1.0, 60, 29.97);\n`;
        jsxCode += `var markerLayer = comp.layers.addNull();\n`;
        jsxCode += `markerLayer.name = "PLAN_DE_PRODUCCION_SRT";\n`;
        
        marcadoresSincronizados.forEach((marcador, index) => {
            const textoLimpio = marcador.texto.replace(/"/g, '\\"');
            jsxCode += `var marker${index} = new MarkerValue("${textoLimpio}");\n`;
            jsxCode += `markerLayer.property("Marker").setValueAtTime(${marcador.tiempo}, marker${index});\n`;
        });
        
        jsxCode += `app.endUndoGroup();\n`;
        
        fAE.file("importar_marcadores_SRT.jsx", jsxCode);

        // Generar descarga
        zip.generateAsync({ type: "blob" }).then(function(content) {
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${nombreProyectoSanitizado}_produccion.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    });

    // EVENTO DEL BOTÓN DE AE: Descargar solo el script por separado
    exportAeBtn.addEventListener('click', () => {
        if (marcadoresSincronizados.length === 0) return;

        let jsxCode = `// Script generado por NIN Studio Manager (Sincronizado vía SRT)\n`;
        jsxCode += `app.beginUndoGroup("Crear Marcadores NIN por SRT");\n`;
        jsxCode += `var comp = app.project.activeItem || app.project.items.addComp("NIN_SRT_Comp", 1920, 1080, 1.0, 60, 29.97);\n`;
        jsxCode += `var markerLayer = comp.layers.addNull();\n`;
        jsxCode += `markerLayer.name = "PLAN_DE_PRODUCCION_SRT";\n`;

        marcadoresSincronizados.forEach((marcador, index) => {
            const textoLimpio = marcador.texto.replace(/"/g, '\\"');
            jsxCode += `var marker${index} = new MarkerValue("${textoLimpio}");\n`;
            jsxCode += `markerLayer.property("Marker").setValueAtTime(${marcador.tiempo}, marker${index});\n`;
        });

        jsxCode += `app.endUndoGroup();\n`;

        const blob = new Blob([jsxCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'importar_marcadores_SRT.jsx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
