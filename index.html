<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIN Studio Manager - Exportador AE</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #252538;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #89b4fa;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .dropzone {
            border: 3px dashed #89b4fa;
            border-radius: 10px;
            padding: 40px 20px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
            background-color: #1e1e2e;
        }
        .dropzone:hover {
            background-color: rgba(137, 180, 250, 0.05);
            border-color: #b4befe;
        }
        .dropzone-text {
            font-size: 16px;
            color: #a6adc8;
        }
        .dropzone-icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #89b4fa;
        }
        .file-status-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
        }
        .file-badge {
            background-color: #313244;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #45475a;
        }
        .file-badge.loaded {
            background-color: rgba(166, 227, 161, 0.1);
            border-color: #a6e3a1;
            color: #a6e3a1;
        }
        /* Barra de carga */
        .loading-container {
            display: none;
            margin: 20px 0;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #313244;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #a6e3a1;
            transition: width 0.4s ease;
        }
        .loading-text {
            color: #a6e3a1;
            font-size: 14px;
            margin-top: 8px;
        }
        /* Resultados de la IA */
        .results-container {
            display: none;
            margin-top: 30px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .results-title {
            color: #f9e2af;
            font-size: 18px;
            margin: 0;
        }
        .export-btn {
            background-color: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-size: 14px;
        }
        .export-btn:hover {
            background-color: #94e2d5;
            transform: scale(1.02);
        }
        .timeline-card {
            background-color: #11111b;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #89b4fa;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .time-badge {
            background-color: #89b4fa;
            color: #11111b;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .card-body {
            font-size: 13px;
            color: #bac2de;
            line-height: 1.4;
        }
        .assets-tag {
            display: inline-block;
            background-color: #313244;
            color: #cdd6f4;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 8px;
            margin-right: 5px;
            border: 1px solid #45475a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NIN Studio Manager</h1>
    
    <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">📁</div>
        <div class="dropzone-text" id="dropzone-instruction">
            <strong>Selecciona y arrastra JUNTOS el audio (.mp3/.wav) y la letra (.txt)</strong><br>
            o suéltalos aquí a la vez
        </div>
        
        <div class="file-status-container">
            <div class="file-badge" id="badge-audio">❌ Sin Audio</div>
            <div class="file-badge" id="badge-text">❌ Sin Letra (.txt)</div>
        </div>
    </div>

    <div class="loading-container" id="loading-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="loading-text" id="loading-text">Esperando archivos...</div>
    </div>

    <div class="results-container" id="results-container">
        <div class="results-header">
            <h2 class="results-title">✨ Plan de Animación Realizado</h2>
            <button class="export-btn" id="export-btn">📥 Exportar a After Effects</button>
        </div>
        <div id="dynamic-cards-container"></div>
    </div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const badgeAudio = document.getElementById('badge-audio');
    const badgeText = document.getElementById('badge-text');
    const loadingContainer = document.getElementById('loading-container');
    const progressFill = document.getElementById('progress-fill');
    const loadingText = document.getElementById('loading-text');
    const resultsContainer = document.getElementById('results-container');
    const dynamicCardsContainer = document.getElementById('dynamic-cards-container');
    const exportBtn = document.getElementById('export-btn');

    let audioFile = null;
    let textFile = null;
    let letraContenido = "";
    let parrafosProcesados = [];

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults (e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => {
            dropzone.style.backgroundColor = 'rgba(137, 180, 250, 0.15)';
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => {
            dropzone.style.backgroundColor = '#1e1e2e';
        }, false);
    });

    dropzone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = Array.from(dt.files);

        files.forEach(file => {
            if (file.name.endsWith('.mp3') || file.name.endsWith('.wav')) {
                audioFile = file;
                badgeAudio.innerText = `🎵 ${file.name}`;
                badgeAudio.classList.add('loaded');
            } else if (file.name.endsWith('.txt')) {
                textFile = file;
                badgeText.innerText = `📄 ${file.name}`;
                badgeText.classList.add('loaded');
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    letraContenido = event.target.result;
                };
                reader.readAsText(file);
            }
        });

        if (audioFile && textFile) {
            iniciarAnalisisReal();
        } else {
            alert("Para exportar, necesitas arrastrar tanto el archivo de Audio como el archivo .txt con la letra.");
        }
    }

    function iniciarAnalisisReal() {
        loadingContainer.style.display = 'block';
        resultsContainer.style.display = 'none';
        
        const etapas = [
            { progreso: 30, texto: "Vinculando " + audioFile.name + " con el texto..." },
            { progreso: 70, texto: "Creando estructura de tiempos para After Effects..." },
            { progreso: 100, texto: "¡Listo para exportar!" }
        ];

        let etapaActual = 0;

        const intervalo = setInterval(() => {
            if (etapaActual < etapas.length) {
                progressFill.style.width = etapas[etapaActual].progreso + '%';
                loadingText.innerText = etapas[etapaActual].texto;
                etapaActual++;
            } else {
                clearInterval(intervalo);
                setTimeout(() => {
                    loadingContainer.style.display = 'none';
                    procesarYMostrarLetra();
                }, 600);
            }
        }, 1000);
    }

    function procesarYMostrarLetra() {
        dynamicCardsContainer.innerHTML = "";
        parrafosProcesados = letraContenido.split('\n').map(p => p.trim()).filter(p => p.length > 0);

        if (parrafosProcesados.length === 0) {
            parrafosProcesados.push("Letra de ejemplo");
        }

        parrafosProcesados.forEach((parrafo, index) => {
            const numEscena = index + 1;
            const segInicio = index * 10; 
            const segFin = (index + 1) * 10;

            const cardHtml = `
                <div class="timeline-card" style="border-left-color: ${index % 2 === 0 ? '#89b4fa' : '#f9e2af'}">
                    <div class="card-header">
                        <span>Escena ${numEscena}: Segmento</span>
                        <span class="time-badge">00:${segInicio.toString().padStart(2, '0')} - 00:${segFin.toString().padStart(2, '0')}</span>
                    </div>
                    <div class="card-body">
                        <strong>Texto:</strong> "${parrafo}"<br>
                        <em>Este fragmento se marcará automáticamente en tu línea de tiempo de After Effects.</em>
                    </div>
                </div>
            `;
            dynamicCardsContainer.innerHTML += cardHtml;
        });

        resultsContainer.style.display = 'block';
    }

    // EVENTO DEL BOTÓN: Generar y descargar el .jsx para After Effects
    exportBtn.addEventListener('click', () => {
        if (parrafosProcesados.length === 0) return;

        // Escribimos el código real de After Effects (ExtendScript) que interpretará el programa
        let jsxCode = `// Script generado automáticamente por NIN Studio Manager\n`;
        jsxCode += `app.beginUndoGroup("Crear Marcadores NIN Manager");\n\n`;
        jsxCode += `var comp = app.project.activeItem;\n`;
        jsxCode += `if (comp == null || !(comp instanceof CompItem)) {\n`;
        jsxCode += `    comp = app.project.items.addComp("NIN_Manager_Comp", 1920, 1080, 1.0, 60, 29.97);\n`;
        jsxCode += `}\n\n`;
        jsxCode += `// Crear una capa nula para albergar los marcadores de producción\n`;
        jsxCode += `var markerLayer = comp.layers.addNull();\n`;
        jsxCode += `markerLayer.name = "PLAN_DE_PRODUCCION";\n\n`;

        // Añadir cada párrafo de la letra como un marcador en el tiempo correspondiente
        parrafosProcesados.forEach((parrafo, index) => {
            const tiempoSegundos = index * 10; // Intervalos de 10 segundos para la prueba
            // Reemplazar comillas para que no rompan el script de AE
            const textoLimpio = parrafo.replace(/"/g, '\\"');
            
            jsxCode += `var myMarker${index} = new MarkerValue("${textoLimpio}");\n`;
            jsxCode += `markerLayer.property("Marker").setValueAtTime(${tiempoSegundos}, myMarker${index});\n`;
        });

        jsxCode += `\napp.endUndoGroup();\n`;
        jsxCode += `alert("¡Listo Mariano! Marcadores creados con éxito en la capa PLAN_DE_PRODUCCION.");\n`;

        // Forzar la descarga del archivo .jsx en el navegador
        const blob = new Blob([jsxCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'importar_marcadores_AE.jsx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
