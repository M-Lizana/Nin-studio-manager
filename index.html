<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIN Studio Manager - Sincronizador SRT</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #252538;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #89b4fa;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .dropzone {
            border: 3px dashed #89b4fa;
            border-radius: 10px;
            padding: 40px 20px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
            background-color: #1e1e2e;
        }
        .dropzone:hover {
            background-color: rgba(137, 180, 250, 0.05);
            border-color: #b4befe;
        }
        .dropzone-text {
            font-size: 16px;
            color: #a6adc8;
        }
        .dropzone-icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #89b4fa;
        }
        .file-status-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
        }
        .file-badge {
            background-color: #313244;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #45475a;
        }
        .file-badge.loaded {
            background-color: rgba(166, 227, 161, 0.1);
            border-color: #a6e3a1;
            color: #a6e3a1;
        }
        /* Barra de carga */
        .loading-container {
            display: none;
            margin: 20px 0;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #313244;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #a6e3a1;
            transition: width 0.4s ease;
        }
        .loading-text {
            color: #a6e3a1;
            font-size: 14px;
            margin-top: 8px;
        }
        /* Resultados */
        .results-container {
            display: none;
            margin-top: 30px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .results-title {
            color: #f9e2af;
            font-size: 18px;
            margin: 0;
        }
        .export-btn {
            background-color: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-size: 14px;
        }
        .export-btn:hover {
            background-color: #94e2d5;
            transform: scale(1.02);
        }
        .timeline-card {
            background-color: #11111b;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #89b4fa;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .time-badge {
            background-color: #f9e2af;
            color: #11111b;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .card-body {
            font-size: 13px;
            color: #bac2de;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NIN Studio Manager</h1>
    
    <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">📁</div>
        <div class="dropzone-text" id="dropzone-instruction">
            <strong>Arrastra JUNTOS el audio (.mp3/.wav) y tus subtítulos (.srt)</strong><br>
            o suéltalos aquí a la vez
        </div>
        
        <div class="file-status-container">
            <div class="file-badge" id="badge-audio">❌ Sin Audio</div>
            <div class="file-badge" id="badge-text">❌ Sin Subtítulos (.srt)</div>
        </div>
    </div>

    <!-- Pantalla de Carga -->
    <div class="loading-container" id="loading-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="loading-text" id="loading-text">Esperando archivos...</div>
    </div>

    <!-- Resultados Dinámicos con botón de exportación -->
    <div class="results-container" id="results-container">
        <div class="results-header">
            <h2 class="results-title">✨ Plan Sincronizado por SRT</h2>
            <button class="export-btn" id="export-btn">📥 Exportar Marcadores a After Effects</button>
        </div>
        <div id="dynamic-cards-container"></div>
    </div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const badgeAudio = document.getElementById('badge-audio');
    const badgeText = document.getElementById('badge-text');
    const loadingContainer = document.getElementById('loading-container');
    const progressFill = document.getElementById('progress-fill');
    const loadingText = document.getElementById('loading-text');
    const resultsContainer = document.getElementById('results-container');
    const dynamicCardsContainer = document.getElementById('dynamic-cards-container');
    const exportBtn = document.getElementById('export-btn');

    let audioFile = null;
    let srtFile = null;
    let srtContent = "";
    let marcadoresSincronizados = [];

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults (e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => {
            dropzone.style.backgroundColor = 'rgba(137, 180, 250, 0.15)';
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => {
            dropzone.style.backgroundColor = '#1e1e2e';
        }, false);
    });

    dropzone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = Array.from(dt.files);

        files.forEach(file => {
            if (file.name.endsWith('.mp3') || file.name.endsWith('.wav')) {
                audioFile = file;
                badgeAudio.innerText = `🎵 ${file.name}`;
                badgeAudio.classList.add('loaded');
            } else if (file.name.endsWith('.srt')) {
                srtFile = file;
                badgeText.innerText = `📄 ${file.name}`;
                badgeText.classList.add('loaded');
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    srtContent = event.target.result;
                };
                reader.readAsText(file);
            }
        });

        if (audioFile && srtFile) {
            iniciarProcesamientoSRT();
        } else {
            alert("Arrastra juntos el archivo de Audio y tu archivo de subtítulos .srt");
        }
    }

    function iniciarProcesamientoSRT() {
        loadingContainer.style.display = 'block';
        resultsContainer.style.display = 'none';
        
        const etapas = [
            { progreso: 40, texto: "Leyendo estructura de tiempos del SRT..." },
            { progreso: 80, texto: "Calculando posiciones de frames para After Effects..." },
            { progreso: 100, texto: "Sincronización milimétrica completada." }
        ];

        let etapaActual = 0;

        const intervalo = setInterval(() => {
            if (etapaActual < etapas.length) {
                progressFill.style.width = etapas[etapaActual].progreso + '%';
                loadingText.innerText = etapas[etapaActual].texto;
                etapaActual++;
            } else {
                clearInterval(intervalo);
                setTimeout(() => {
                    loadingContainer.style.display = 'none';
                    parsearSRT();
                }, 600);
            }
        }, 800);
    }

    // El "motor" que traduce el archivo SRT a datos limpios
    function parsearSRT() {
        dynamicCardsContainer.innerHTML = "";
        marcadoresSincronizados = [];

        // Limpieza básica de saltos de línea para que sea uniforme
        const bloques = srtContent.replace(/\r\n/g, '\n').split('\n\n');

        bloques.forEach((bloque) => {
            const lineas = bloque.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            // Un bloque SRT válido suele tener al menos: 1 (Número), 00:00:02,100 --> 00:00:04,300 (Tiempos), y el Texto
            if (lineas.length >= 3) {
                const tiempoStr = lineas[1];
                const textoSubtitulo = lineas.slice(2).join(' '); // Une si hay subtítulos de varias líneas

                // Extraemos el tiempo de inicio (00:00:02,100)
                const partesTiempo = tiempoStr.split('-->');
                if (partesTiempo.length > 0) {
                    const tiempoInicioRaw = partesTiempo[0].trim(); // "00:00:02,100"
                    const segundosReales = srtToSegundos(tiempoInicioRaw);

                    marcadoresSincronizados.push({
                        tiempo: segundosReales,
                        tiempoFormato: tiempoInicioRaw.substring(3, 12), // Recorta horas para mostrar MM:SS,mmm
                        texto: textoSubtitulo
                    });
                }
            }
        });

        // Mostrar en pantalla los resultados reales
        marcadoresSincronizados.forEach((marcador, index) => {
            const cardHtml = `
                <div class="timeline-card" style="border-left-color: ${index % 2 === 0 ? '#89b4fa' : '#b4befe'}">
                    <div class="card-header">
                        <span>Marcador ${index + 1}</span>
                        <span class="time-badge">⏱️ Segundo ${marcador.tiempo.toFixed(3)}s (${marcador.tiempoFormato})</span>
                    </div>
                    <div class="card-body">
                        <strong>Texto del Subtítulo:</strong> "${marcador.texto}"
                    </div>
                </div>
            `;
            dynamicCardsContainer.innerHTML += cardHtml;
        });

        resultsContainer.style.display = 'block';
    }

    // Traduce "00:01:15,500" a 75.5 segundos reales para el reloj de After Effects
    function srtToSegundos(srtTime) {
        const partes = srtTime.replace(',', '.').split(':');
        const horas = parseFloat(partes[0]) || 0;
        const minutos = parseFloat(partes[1]) || 0;
        const segundos = parseFloat(partes[2]) || 0;
        return (horas * 3600) + (minutos * 60) + segundos;
    }

    // EVENTO DEL BOTÓN: Generar el .jsx usando los tiempos CLAVADOS del SRT
    exportBtn.addEventListener('click', () => {
        if (marcadoresSincronizados.length === 0) return;

        let jsxCode = `// Script generado por NIN Studio Manager (Sincronizado vía SRT)\n`;
        jsxCode += `app.beginUndoGroup("Crear Marcadores NIN por SRT");\n\n`;
        jsxCode += `var comp = app.project.activeItem;\n`;
        jsxCode += `if (comp == null || !(comp instanceof CompItem)) {\n`;
        jsxCode += `    comp = app.project.items.addComp("NIN_SRT_Comp", 1920, 1080, 1.0, 60, 29.97);\n`;
        jsxCode += `}\n\n`;
        jsxCode += `var markerLayer = comp.layers.addNull();\n`;
        jsxCode += `markerLayer.name = "PLAN_DE_PRODUCCION_SRT";\n\n`;

        // Colocar los marcadores en los segundos EXACTOS del SRT
        marcadoresSincronizados.forEach((marcador, index) => {
            const textoLimpio = marcador.texto.replace(/"/g, '\\"');
            jsxCode += `var marker${index} = new MarkerValue("${textoLimpio}");\n`;
            // marcador.tiempo contiene el decimal exacto (ej. 2.15 segundos)
            jsxCode += `markerLayer.property("Marker").setValueAtTime(${marcador.tiempo}, marker${index});\n`;
        });

        jsxCode += `\napp.endUndoGroup();\n`;
        jsxCode += `alert("¡Listo! Se han colocado ${marcadoresSincronizados.length} marcadores en sincronización milimétrica con tu audio.");\n`;

        const blob = new Blob([jsxCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'importar_marcadores_SRT.jsx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
